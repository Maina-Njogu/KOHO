<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOHO Investment Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{\n  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242432;\n  --border:#2a2a3a;--text:#f0eff8;--muted:#6b6a80;\n  --accent:#7c6af7;--accent-light:rgba(124,106,247,0.15);--accent-glow:rgba(124,106,247,0.3);\n  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);\n  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);\n  --gold:#f59e0b;--gold-dim:rgba(245,158,11,0.12);\n  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);\n  --radius:12px;--radius-sm:8px;--radius-lg:16px;\n  --font:'Space Grotesk',sans-serif;--font-display:'Syne',sans-serif;\n}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;overflow-x:hidden}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.hlogo{font-family:var(--font-display);font-size:20px;font-weight:800;background:linear-gradient(135deg,#7c6af7,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hright{display:flex;align-items:center;gap:10px}
.sync-pill{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px)}
aside{background:var(--surface);border-right:1px solid var(--border);padding:1.25rem .75rem;display:flex;flex-direction:column;gap:2px}
.nlbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 10px;margin:14px 0 5px;font-weight:600}
.nb{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);background:none;border:none;color:var(--muted);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s}
.nb:hover{background:var(--surface2);color:var(--text)}
.nb.on{background:var(--accent-light);color:var(--accent);font-weight:600}
.nb svg{width:16px;height:16px;stroke-width:2}
.nc{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px}
.nc.red{background:var(--red)}.nc.gold{background:var(--gold)}

main{padding:1.75rem;background:var(--bg)}
.pg{display:none}.pg.on{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.pt{font-family:var(--font-display);font-size:24px;font-weight:800}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;border-left:4px solid var(--border)}
.mc.purple{border-left-color:var(--accent)}.mc.green{border-left-color:var(--green)}
.mc.red{border-left-color:var(--red)}.mc.gold{border-left-color:var(--gold)}
.ml{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:7px}
.mv{font-size:22px;font-weight:700;font-family:var(--font-display)}

.g2
